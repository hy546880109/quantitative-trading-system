<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化交易系统 v1.0</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f0f2f6; }
        .header { background: linear-gradient(135deg, #1f77b4 0%, #2c3e50 100%); color: white; padding: 20px; text-align: center; font-size: 2.5rem; font-weight: bold; }
        .container { display: flex; min-height: 100vh; }
        .sidebar { width: 320px; background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); position: fixed; height: 100vh; overflow-y: auto; }
        .main { margin-left: 320px; flex: 1; padding: 20px; }
        .section { margin-bottom: 20px; }
        .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; color: #333; border-bottom: 2px solid #1f77b4; padding-bottom: 5px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; color: #555; }
        select, input[type="text"], input[type="number"], input[type="date"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; margin-bottom: 10px; }
        .btn-primary { background: linear-gradient(135deg, #1f77b4 0%, #2c3e50 100%); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        .btn-primary:hover { opacity: 0.9; }
        .metric-card { background: white; border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .metric-value { font-size: 1.8rem; font-weight: bold; color: #1f77b4; }
        .positive { color: #28a745; } .negative { color: #dc3545; }
        .chart-container { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .data-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .data-table th { background: #f8f9fa; font-weight: 600; }
        .slider-container { margin-bottom: 15px; }
        .slider-value { display: inline-block; background: #1f77b4; color: white; padding: 2px 8px; border-radius: 3px; margin-left: 10px; }
        input[type="range"] { width: 100%; margin: 5px 0; }
        .hidden { display: none !important; }
        .metrics-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; margin-bottom: 20px; }
        .metric-item { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .metric-label { font-size: 0.9rem; color: #666; margin-bottom: 5px; }
        .metric-number { font-size: 1.5rem; font-weight: bold; color: #1f77b4; }
        .info-box { background: #e7f3ff; border-left: 5px solid #2196F3; padding: 10px; margin: 10px 0; border-radius: 0 5px 5px 0; }
        @media (max-width: 768px) { .sidebar { width: 100%; position: relative; height: auto; } .main { margin-left: 0; } .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="header">📈 量化交易系统 v1.0</div>
    <div class="container">
        <div class="sidebar">
            <div class="section"><div class="section-title">⚙️ 系统配置</div></div>
            <div class="section"><label>📊 数据源</label><select id="dataSource"><option value="mock">模拟数据</option><option value="yahoo">Yahoo Finance</option><option value="tushare">TuShare</option></select></div>
            <div class="section" id="stockSection"><label>📈 股票代码</label><select id="stockCategory"><option value="hot_a">🔥 热门A股</option><option value="index">📊 主要指数</option><option value="us">🌐 美股热门</option><option value="test">🧪 测试用</option></select><select id="stockSelect"><option value="000001.SZ">000001.SZ - 平安银行</option><option value="000858.SZ">000858.SZ - 五粮液</option><option value="002415.SZ">002415.SZ - 海康威视</option><option value="600519.SH">600519.SH - 贵州茅台</option><option value="600036.SH">600036.SH - 招商银行</option><option value="601318.SH">601318.SH - 中国平安</option><option value="000333.SZ">000333.SZ - 美的集团</option><option value="002594.SZ">002594.SZ - 比亚迪</option><option value="600276.SH">600276.SH - 恒瑞医药</option><option value="601012.SH">601012.SH - 隆基绿能</option></select><div style="margin-top:10px;"><input type="checkbox" id="useCustom"><label for="useCustom" style="display:inline;">手动输入股票代码</label></div><input type="text" id="customSymbol" class="hidden" placeholder="输入股票代码"></div>
            <div class="section hidden" id="tokenSection"><label>TuShare Token</label><input type="password" id="tushareToken" placeholder="输入TuShare Token"></div>
            <div class="section"><label>📅 日期范围</label><label>开始日期</label><input type="date" id="startDate"><label>结束日期</label><input type="date" id="endDate"></div>
            <div class="section"><label>🎯 交易策略</label><select id="strategy"><option value="ma">移动平均线策略 (MA)</option><option value="rsi">RSI策略</option><option value="macd">MACD策略</option><option value="boll">布林带策略</option><option value="kdj">KDJ策略</option><option value="ema">EMA策略</option></select></div>
            <div class="section"><label>💰 初始资金 (¥)</label><input type="number" id="initialCapital" value="100000" min="1000" max="100000000" step="10000"></div>
            <div class="section"><button class="btn-primary" onclick="loadData()">📥 加载数据</button><button class="btn-primary" onclick="runBacktest()">🚀 运行回测</button></div>
        </div>
        <div class="main">
            <div id="dataPreview" class="hidden"><h3>📋 数据预览</h3><div class="metrics-grid"><div class="metric-item"><div class="metric-label">数据条数</div><div class="metric-number" id="dataCount">-</div></div><div class="metric-item"><div class="metric-label">起始日期</div><div class="metric-number" id="dataStart">-</div></div><div class="metric-item"><div class="metric-label">结束日期</div><div class="metric-number" id="dataEnd">-</div></div><div class="metric-item"><div class="metric-label">最新收盘价</div><div class="metric-number" id="dataClose">-</div></div></div><table class="data-table"><thead><tr><th>日期</th><th>开盘</th><th>最高</th><th>最低</th><th>收盘</th><th>成交量</th></tr></thead><tbody id="dataTableBody"></tbody></table></div>
            <div id="priceChartSection" class="chart-container hidden"><h3>📊 股票价格走势</h3><div id="priceChart" style="height:500px;"></div></div>
            <div id="backtestResult" class="hidden"><h3>📊 回测结果</h3><div class="metrics-grid"><div class="metric-item"><div class="metric-label">初始资金</div><div class="metric-number" id="resultInitial">-</div></div><div class="metric-item"><div class="metric-label">最终价值</div><div class="metric-number" id="resultFinal">-</div></div><div class="metric-item"><div class="metric-label">总收益率</div><div class="metric-number" id="resultReturn">-</div></div><div class="metric-item"><div class="metric-label">夏普比率</div><div class="metric-number" id="resultSharpe">-</div></div><div class="metric-item"><div class="metric-label">最大回撤</div><div class="metric-number" id="resultDrawdown">-</div></div><div class="metric-item"><div class="metric-label">交易次数</div><div class="metric-number" id="resultTrades">-</div></div></div><div class="chart-container"><h3>📈 资金曲线</h3><div id="equityChart" style="height:500px;"></div></div><h3>📝 交易记录</h3><table class="data-table"><thead><tr><th>日期</th><th>股票代码</th><th>操作</th><th>数量</th><th>价格</th><th>总金额</th></tr></thead><tbody id="tradesTableBody"></tbody></table></div>
        </div>
    </div>
    <script>
        const stockCategories={hot_a:{label:"🔥 热门A股",stocks:[{code:"000001.SZ",name:"平安银行"},{code:"000858.SZ",name:"五粮液"},{code:"002415.SZ",name:"海康威视"},{code:"600519.SH",name:"贵州茅台"},{code:"600036.SH",name:"招商银行"},{code:"601318.SH",name:"中国平安"},{code:"000333.SZ",name:"美的集团"},{code:"002594.SZ",name:"比亚迪"},{code:"600276.SH",name:"恒瑞医药"},{code:"601012.SH",name:"隆基绿能"}]},index:{label:"📊 主要指数",stocks:[{code:"000001.SH",name:"上证指数"},{code:"399001.SZ",name:"深证成指"},{code:"399006.SZ",name:"创业板指"},{code:"000300.SH",name:"沪深300"},{code:"000016.SH",name:"上证50"},{code:"000905.SH",name:"中证500"}]},us:{label:"🌐 美股热门",stocks:[{code:"AAPL",name:"苹果公司"},{code:"MSFT",name:"微软"},{code:"GOOGL",name:"谷歌"},{code:"AMZN",name:"亚马逊"},{code:"TSLA",name:"特斯拉"},{code:"NVDA",name:"英伟达"},{code:"META",name:"Meta"},{code:"BABA",name:"阿里巴巴"}]},test:{label:"🧪 测试用",stocks:[{code:"TEST",name:"模拟测试"}]}};
        let currentData=null,backtestResult=null;
        document.getElementById('endDate').valueAsDate=new Date();
        document.getElementById('startDate').valueAsDate=new Date(Date.now()-365*24*60*60*1000);
        document.getElementById('dataSource').addEventListener('change',function(){document.getElementById('tokenSection').classList.toggle('hidden',this.value!=='tushare')});
        document.getElementById('stockCategory').addEventListener('change',function(){const s=stockCategories[this.value].stocks;document.getElementById('stockSelect').innerHTML=s.map(x=>`<option value="${x.code}">${x.code}-${x.name}</option>`).join('')});
        document.getElementById('useCustom').addEventListener('change',function(){document.getElementById('customSymbol').classList.toggle('hidden',!this.checked);document.getElementById('stockSelect').classList.toggle('hidden',this.checked)});
        function generateMockData(startDate,endDate){const start=new Date(startDate),end=new Date(endDate),dates=[];let current=new Date(start);while(current<=end){if(current.getDay()<5)dates.push(new Date(current));current.setDate(current.getDate()+1)}let price=100;const data={dates:[],open:[],high:[],low:[],close:[],volume:[]};for(const date of dates){price+=(Math.random()-0.5)*2;const open=price+(Math.random()-0.5)*0.5,close=price+(Math.random()-0.5)*0.5,high=Math.max(open,close)+Math.random()*2,low=Math.min(open,close)-Math.random()*2,volume=Math.floor(Math.random()*4000000)+1000000;data.dates.push(date.toISOString().split('T')[0]);data.open.push(open);data.high.push(high);data.low.push(low);data.close.push(close);data.volume.push(volume);price=close}return data}
        function calculateSMA(data,window){const sma=[];for(let i=0;i<data.length;i++){if(i<window-1)sma.push(null);else{let sum=0;for(let j=0;j<window;j++)sum+=data[i-j];sma.push(sum/window)}}return sma}
        function calculateEMA(data,window){const ema=[],multiplier=2/(window+1);let prevEMA=data[0];for(let i=0;i<data.length;i++){if(i===0)ema.push(data[0]);else{const currentEMA=(data[i]-prevEMA)*multiplier+prevEMA;ema.push(currentEMA);prevEMA=currentEMA}}return ema}
        function calculateRSI(data,window){const rsi=[];for(let i=0;i<data.length;i++){if(i<window){rsi.push(null);continue}let gains=0,losses=0;for(let j=i-window+1;j<=i;j++){const change=data[j]-data[j-1];if(change>0)gains+=change;else losses-=change}const avgGain=gains/window,avgLoss=losses/window,rs=avgGain/(avgLoss||1);rsi.push(100-(100/(1+rs)))}return rsi}
        function calculateMACD(data,fast,slow,signal){const emaFast=calculateEMA(data,fast),emaSlow=calculateEMA(data,slow),macdLine=emaFast.map((v,i)=>v-emaSlow[i]),signalLine=calculateEMA(macdLine,signal),histogram=macdLine.map((v,i)=>v-signalLine[i]);return{macdLine,signalLine,histogram}}
        function calculateBollingerBands(data,window,numStd){const ma=calculateSMA(data,window),upper=[],lower=[];for(let i=0;i<data.length;i++){if(i<window-1){upper.push(null);lower.push(null)}else{let sum=0;for(let j=0;j<window;j++)sum+=Math.pow(data[i-j]-ma[i],2);const std=Math.sqrt(sum/window);upper.push(ma[i]+std*numStd);lower.push(ma[i]-std*numStd)}}return{upper,middle:ma,lower}}
        function calculateStochastic(data,kWindow,dWindow){const kPercent=[];for(let i=0;i<data.length;i++){if(i<kWindow-1){kPercent.push(null);continue}let lowest=data[i],highest=data[i];for(let j=i-kWindow+1;j<=i;j++){lowest=Math.min(lowest,data[j]);highest=Math.max(highest,data[j])}const range=highest-lowest||1;kPercent.push(100*(data[i]-lowest)/range)}const dPercent=calculateSMA(kPercent.filter(v=>v!==null),dWindow);while(dPercent.length<kPercent.length)dPercent.unshift(null);return{kPercent,dPercent}}
        function generateSignals(data,strategy){const signals=new Array(data.length).fill(0),closes=data.close;switch(strategy){case'ma':{const shortWindow=10,longWindow=30,shortMA=calculateSMA(closes,shortWindow),longMA=calculateSMA(closes,longWindow);for(let i=longWindow;i<closes.length;i++){if(shortMA[i]>longMA[i]&&shortMA[i-1]<=longMA[i-1])signals[i]=1;else if(shortMA[i]<longMA[i]&&shortMA[i-1]>=longMA[i-1])signals[i]=-1}break}case'rsi':{const rsiWindow=14,oversold=30,overbought=70,rsi=calculateRSI(closes,rsiWindow);for(let i=rsiWindow;i<closes.length;i++){if(rsi[i]<oversold&&rsi[i-1]>=oversold)signals[i]=1;else if(rsi[i]>overbought&&rsi[i-1]<=overbought)signals[i]=-1}break}case'macd':{const fast=12,slow=26,signal=9,macd=calculateMACD(closes,fast,slow,signal);for(let i=slow;i<closes.length;i++){if(macd.macdLine[i]>macd.signalLine[i]&&macd.macdLine[i-1]<=macd.signalLine[i-1])signals[i]=1;else if(macd.macdLine[i]<macd.signalLine[i]&&macd.macdLine[i-1]>=macd.signalLine[i-1])signals[i]=-1}break}case'boll':{const bbWindow=20,numStd=2,bb=calculateBollingerBands(closes,bbWindow,numStd);for(let i=bbWindow;i<closes.length;i++){if(closes[i]<bb.lower[i])signals[i]=1;else if(closes[i]>bb.upper[i])signals[i]=-1}break}case'kdj':{const kWindow=9,dWindow=3,stoch=calculateStochastic(closes,kWindow,dWindow);for(let i=kWindow;i<closes.length;i++){if(stoch.kPercent[i]>stoch.dPercent[i]&&stoch.kPercent[i-1]<=stoch.dPercent[i-1]&&stoch.kPercent[i]<20)signals[i]=1;else if(stoch.kPercent[i]<stoch.dPercent[i]&&stoch.kPercent[i-1]>=stoch.dPercent[i-1]&&stoch.kPercent[i]>80)signals[i]=-1}break}case'ema':{const emaShort=12,emaLong=26,shortEMA=calculateEMA(closes,emaShort),longEMA=calculateEMA(closes,emaLong);for(let i=emaLong;i<closes.length;i++){if(shortEMA[i]>longEMA[i]&&shortEMA[i-1]<=longEMA[i-1])signals[i]=1;else if(shortEMA[i]<longEMA[i]&&shortEMA[i-1]>=longEMA[i-1])signals[i]=-1}break}}return signals}
        function runBacktestEngine(data,signals,symbol,initialCapital){let cash=initialCapital,portfolio=0,trades=[],equityCurve=[],position=0;for(let i=0;i<data.length;i++){const price=data.close[i],signal=signals[i],date=data.dates[i];if(signal===1&&position===0){const quantity=Math.floor(cash*0.95/price);if(quantity>0){const cost=quantity*price;cash-=cost;position=quantity;trades.push({date,symbol,action:'BUY',quantity,price,total:cost})}}else if(signal===-1&&position>0){const proceeds=position*price;cash+=proceeds;trades.push({date,symbol,action:'SELL',quantity:position,price,total:proceeds});position=0}const portfolioValue=cash+position*price;equityCurve.push({date,portfolio_value:portfolioValue,cash,holdings:position*price})}const finalValue=cash+position*data.close[data.length-1],totalReturn=(finalValue-initialCapital)/initialCapital,returns=[];for(let i=1;i<equityCurve.length;i++)returns.push((equityCurve[i].portfolio_value-equityCurve[i-1].portfolio_value)/equityCurve[i-1].portfolio_value);const meanReturn=returns.reduce((a,b)=>a+b,0)/returns.length*252,stdReturn=Math.sqrt(returns.reduce((sq,n)=>sq+Math.pow(n-returns.reduce((a,b)=>a+b,0)/returns.length,2),0)/returns.length)*Math.sqrt(252),sharpeRatio=stdReturn>0?(meanReturn-0.03)/stdReturn:0;let peak=equityCurve[0].portfolio_value,maxDrawdown=0;for(const point of equityCurve){if(point.portfolio_value>peak)peak=point.portfolio_value;const drawdown=(peak-point.portfolio_value)/peak;if(drawdown>maxDrawdown)maxDrawdown=drawdown}return{initial_capital:initialCapital,final_value:finalValue,total_return:totalReturn,total_return_pct:totalReturn*100,sharpe_ratio:sharpeRatio,max_drawdown:maxDrawdown*100,total_trades:trades.length,buy_trades:trades.filter(t=>t.action==='BUY').length,sell_trades:trades.filter(t=>t.action==='SELL').length,equity_curve:equityCurve,trades}}
        function loadData(){const startDate=document.getElementById('startDate').value,endDate=document.getElementById('endDate').value;let symbol;if(document.getElementById('useCustom').checked)symbol=document.getElementById('customSymbol').value;else symbol=document.getElementById('stockSelect').value;if(!startDate||!endDate){alert('请选择日期范围');return}currentData=generateMockData(startDate,endDate);currentData.symbol=symbol;document.getElementById('dataPreview').classList.remove('hidden');document.getElementById('priceChartSection').classList.remove('hidden');document.getElementById('dataCount').textContent=currentData.dates.length;document.getElementById('dataStart').textContent=currentData.dates[0];document.getElementById('dataEnd').textContent=currentData.dates[currentData.dates.length-1];document.getElementById('dataClose').textContent='¥'+currentData.close[currentData.close.length-1].toFixed(2);const tbody=document.getElementById('dataTableBody');tbody.innerHTML='';for(let i=Math.max(0,currentData.dates.length-20);i<currentData.dates.length;i++){const row=tbody.insertRow();row.innerHTML=`<td>${currentData.dates[i]}</td><td>¥${currentData.open[i].toFixed(2)}</td><td>¥${currentData.high[i].toFixed(2)}</td><td>¥${currentData.low[i].toFixed(2)}</td><td>¥${currentData.close[i].toFixed(2)}</td><td>${currentData.volume[i].toLocaleString()}</td>`}const candlestick={x:currentData.dates,open:currentData.open,high:currentData.high,low:currentData.low,close:currentData.close,type:'candlestick',name:'K线',increasing:{line:{color:'#26a69a'},fillcolor:'#26a69a'},decreasing:{line:{color:'#ef5350'},fillcolor:'#ef5350'}},volume={x:currentData.dates,y:currentData.volume,type:'bar',name:'成交量',marker:{color:currentData.close.map((c,i)=>c>=currentData.open[i]?'#26a69a':'#ef5350')},yaxis:'y2'},layout={title:`${symbol}股票价格走势`,xaxis:{title:'日期',rangeslider:{visible:false}},yaxis:{title:'价格',domain:[0.3,1]},yaxis2:{title:'成交量',domain:[0,0.2]},height:500};Plotly.newPlot('priceChart',[candlestick,volume],layout)}
        function runBacktest(){if(!currentData){alert('请先加载数据');return}const strategy=document.getElementById('strategy').value,initialCapital=parseFloat(document.getElementById('initialCapital').value);let symbol;if(document.getElementById('useCustom').checked)symbol=document.getElementById('customSymbol').value;else symbol=document.getElementById('stockSelect').value;const signals=generateSignals(currentData,strategy);backtestResult=runBacktestEngine(currentData,signals,symbol,initialCapital);document.getElementById('backtestResult').classList.remove('hidden');document.getElementById('resultInitial').textContent='¥'+backtestResult.initial_capital.toLocaleString();document.getElementById('resultFinal').textContent='¥'+backtestResult.final_value.toLocaleString();document.getElementById('resultReturn').textContent=(backtestResult.total_return_pct>=0?'+':'')+backtestResult.total_return_pct.toFixed(2)+'%';document.getElementById('resultReturn').className='metric-number '+(backtestResult.total_return_pct>=0?'positive':'negative');document.getElementById('resultSharpe').textContent=backtestResult.sharpe_ratio.toFixed(2);document.getElementById('resultDrawdown').textContent=backtestResult.max_drawdown.toFixed(2)+'%';document.getElementById('resultTrades').textContent=backtestResult.total_trades;const equityTrace={x:backtestResult.equity_curve.map(p=>p.date),y:backtestResult.equity_curve.map(p=>p.portfolio_value),type:'scatter',mode:'lines',name:'总资产',line:{color:'blue',width:2}},initialTrace={x:backtestResult.equity_curve.map(p=>p.date),y:backtestResult.equity_curve.map(()=>backtestResult.initial_capital),type:'scatter',mode:'lines',name:'初始资金',line:{color:'gray',dash:'dash'}},holdingsTrace={x:backtestResult.equity_curve.map(p=>p.date),y:backtestResult.equity_curve.map(p=>p.holdings),type:'scatter',mode:'lines',name:'持仓市值',fill:'tozeroy',line:{color:'orange'}},cashTrace={x:backtestResult.equity_curve.map(p=>p.date),y:backtestResult.equity_curve.map(p=>p.cash),type:'scatter',mode:'lines',name:'现金',line:{color:'green'}},equityLayout={title:`回测结果-总收益率:${backtestResult.total_return_pct.toFixed(2)}%`,xaxis:{title:'日期'},yaxis:{title:'金额'},height:500};Plotly.newPlot('equityChart',[equityTrace,initialTrace,holdingsTrace,cashTrace],equityLayout);const tradesBody=document.getElementById('tradesTableBody');tradesBody.innerHTML='';for(const trade of backtestResult.trades){const row=tradesBody.insertRow();row.innerHTML=`<td>${trade.date}</td><td>${trade.symbol}</td><td>${trade.action==='BUY'?'买入':'卖出'}</td><td>${trade.quantity}</td><td>¥${trade.price.toFixed(2)}</td><td>¥${trade.total.toLocaleString()}</td>`}}
    </script>
</body>
</html>
